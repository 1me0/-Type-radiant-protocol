<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant · CIS + Alignment + Drift + 🔒</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{box-sizing:border-box;font-family:system-ui,sans-serif}
        body{background:#eef2f5;margin:0;padding:20px}
        .grid{display:flex;flex-wrap:wrap;gap:20px;max-width:1400px;margin:auto}
        .panel{background:white;border-radius:24px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        .participants{flex:1.2;min-width:260px}
        .chart-panel{flex:1.5}
        .deep-panel{flex:1.3;background:#fef9e3;border-left:4px solid #f59e0b}
        .secure-panel{flex:1;background:#e0f2f1;border-left:4px solid #10b981}
        h3{margin:0 0 12px;border-left:4px solid #2c7da0;padding-left:12px}
        .card{background:#f9fbfd;border-radius:16px;padding:10px;margin-bottom:12px;border:1px solid #e2e8f0}
        .row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
        .name{font-weight:700;background:#eef2ff;padding:2px 12px;border-radius:40px}
        button{background:#1e4663;border:none;color:white;padding:4px 12px;border-radius:40px;cursor:pointer}
        button.listening{background:#c2410c}
        .status,.badge{font-size:0.7rem;background:#eef2ff;padding:2px 10px;border-radius:20px}
        .transcript{font-size:0.7rem;background:#f8fafc;border-radius:12px;padding:5px;margin-top:6px;border-left:3px solid #2c7da0}
        .add-bar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
        input,select{padding:4px 8px;border-radius:40px;border:1px solid #cbd5e1}
        canvas{max-height:260px;width:100%}
        .summary{display:flex;justify-content:space-between;margin-top:12px;background:#eef2ff;border-radius:20px;padding:4px 10px;font-size:0.7rem}
        .interpretation-box{background:#fff8e7;border-radius:16px;padding:10px;font-size:0.75rem;max-height:500px;overflow-y:auto}
        .int-section{margin-bottom:8px;border-bottom:1px dashed #e2d5b6;padding-bottom:6px}
        .section-title{font-weight:bold;color:#b45309}
        .translator{background:#fef9e3;border-radius:20px;padding:8px;margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap}
        .secure-card{background:#f1f5f4;border-radius:16px;padding:10px;margin-bottom:8px;border:1px solid #a5f0c7}
        .copy-btn{background:#10b981;color:white;font-size:0.7rem;padding:2px 8px;border-radius:9999px;border:none;cursor:pointer;margin-top:4px}
        code{font-size:0.65rem;word-break:break-all}
        .decrypted-result{background:#e8f5e9;border-radius:8px;padding:6px;margin-top:6px}
    </style>
</head>
<body>
<div class="grid">
    <div class="panel participants">
        <h3>🎙️ Radiant Interpreter</h3>
        <div class="translator">
            <label><input type="checkbox" id="transToggle" checked> 🌐 Translation</label>
            <select id="targetLang"><option value="en">English</option><option value="sw">Swahili (expressive)</option><option value="es">Spanish</option><option value="fr">French</option></select>
        </div>
        <div id="participantsList"></div>
        <div class="add-bar">
            <input type="text" id="newName" placeholder="Name" value="Speaker">
            <select id="newLang"><option value="en">en</option><option value="sw">sw</option><option value="es">es</option></select>
            <button id="addBtn">+ Add</button>
            <button id="resetBtn" style="background:#94a3b8">Reset</button>
            <button id="stopAllBtn" style="background:#94a3b8">Stop all</button>
        </div>
        <div class="summary"><span>📊 Turns: <strong id="turnCount">0</strong></span><span>🌍 EMA: <strong id="emaScore">—</strong></span><span>🎧 Trans: <strong id="lastTS">—</strong></span><span>📐 Drift: <strong id="driftValue">0.0</strong></span><span>🔒 <strong id="secureCount">0</strong></span></div>
    </div>

    <div class="panel chart-panel">
        <h3>📈 CIS · Alignment · Threshold (7.0)</h3>
        <canvas id="graph"></canvas>
        <div class="summary" style="margin-top:8px">🔹 Alignment = 0.5·CIS + 0.5·TransScore | Drift = CIS(original) – CIS(translated)</div>
    </div>

    <div class="panel deep-panel">
        <h3>🧠 Deep Interpretation (Alignment feedback)</h3>
        <div id="interpretationBox" class="interpretation-box">Awaiting speech...</div>
    </div>

    <div class="panel secure-panel">
        <h3>🔒 Encrypted Vault</h3>
        <div class="translator">
            <label>🔑 Key: <input type="password" id="roomKey" value="radiant2026" style="width:120px"></label>
            <button id="regenKey" style="background:#10b981">New</button>
            <label><input type="checkbox" id="autoEncrypt" checked> Auto</label>
        </div>
        <div class="add-bar">
            <input type="text" id="secureMsg" placeholder="Secure message..." style="flex:1">
            <button id="encryptSend">🔒 Send</button>
        </div>
        <div id="secureMessages" style="max-height:300px;overflow-y:auto;background:#f1f5f4;border-radius:16px;padding:10px"></div>
        <div class="row" style="margin-top:12px">
            <button id="simulateCall" style="background:#10b981;flex:1">📞 Simulate</button>
            <button id="clearSecure" style="background:#94a3b8">Clear</button>
        </div>
    </div>
</div>

<script>
// ---------- CIS (0-10) ----------
const cis = t => { let w=(t||"").toLowerCase().match(/\b[\w']+\b/g)||[]; if(!w.length) return 0; let u=new Set(w), f={}; w.forEach(v=>f[v]=(f[v]||0)+1); let H=0; for(let c of Object.values(f)){let p=c/w.length; H-=p*Math.log2(p)} let Hnorm=u.size>1?Math.min(1,H/Math.log2(u.size)):0; let raw=0.4*Hnorm+0.4*(u.size/w.length)+0.2*Math.min(1,w.length/15); return Math.min(10,Math.max(0,10*Math.tanh(1.8*raw))) };
let ema=null; const updE=v=>ema=ema===null?v:0.3*v+0.7*ema;

// ---------- Translation (MyMemory + Swahili expressive) ----------
const translate=async(txt,src,tgt)=>{ if(!txt.trim()||src===tgt) return {trans:txt,conf:1}; try{ let r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(txt)}&langpair=${src}|${tgt}`), d=await r.json(); let trans=d.responseData.translatedText.replace(/&quot;/g,'"'), conf=d.responseData.match?d.responseData.match/100:0.7; conf=Math.min(0.99,Math.max(0.3,conf)); if(tgt==='sw'){ if(txt.match(/\b(Lyapunov|convergence|gradient|algorithm|stability|monotone)\b/i)) trans+=" (Hii inamaanisha: mfumo unapunguza makosa hatua kwa hatua, hakuna kurudi nyuma, mwisho utulivu unafikiwa.)"; else if(trans.split(/\s+/).length<4) trans+=" – Kuna maana ndani, si maneno tu."; } return {trans,conf}; }catch(e){ return {trans:txt+" [offline]",conf:0.4} } };
const transScore=(txt,conf)=> txt&&!txt.includes("error")?Math.min(10,10*(conf*0.7+Math.min(1,txt.split(/\s+/).length/20)*0.3)):0;
const speak=(txt,lang)=>{ let u=new SpeechSynthesisUtterance(txt); u.lang=lang; speechSynthesis.cancel(); speechSynthesis.speak(u); };

// ---------- Alignment = 0.5·CIS + 0.5·TransScore ----------
const align=(c,t)=>0.5*c+0.5*(t||0);

// ---------- Deep interpretation (compact) ----------
function renderDeep(orig, c, trans, ts, al){
    let w=orig.split(/\s+/).length, drift=c-(trans?cis(trans):0);
    let core=`${w} words · CIS ${c.toFixed(1)} · Align ${al.toFixed(1)} · Drift ${drift.toFixed(2)}`;
    let transLine=`"${trans||'none'}" (CIS ${c.toFixed(1)} / Trans ${(ts||0).toFixed(1)})`;
    let abs=al>=8?"Perfect alignment: meaning preserved.":al>=6?"Good alignment, minor shifts.":"Radiance loss – rephrase or change language.";
    let verdict=al>=8?"Excellent – transformative.":al>=5?"Adequate – refine.":"Low radiance – restructure.";
    document.getElementById('interpretationBox').innerHTML=`
        <div class="int-section"><span class="section-title">📖 Core + Alignment</span><br>${core}</div>
        <div class="int-section"><span class="section-title">🌍 Translation</span><br>${transLine}</div>
        <div class="int-section"><span class="section-title">🌀 Abstraction</span><br>${abs}</div>
        <div class="int-section"><span class="section-title">🎯 Verdict</span><br>${verdict}</div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('interpretationBox').innerText)">📋 Copy</button>
    `;
    return drift;
}

// ---------- AES-GCM (unchanged) ----------
let secureMsgs=[];
const deriveKey=async pw=>{ const e=new TextEncoder(); const k=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]); return crypto.subtle.deriveKey({name:"PBKDF2",salt:e.encode("radiant-salt"),iterations:60000,hash:"SHA-256"},k,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]) };
const encrypt=async (txt,pw)=>{ const key=await deriveKey(pw), e=new TextEncoder(), iv=crypto.getRandomValues(new Uint8Array(12)), data=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,e.encode(txt)); const c=new Uint8Array(iv.length+data.byteLength); c.set(iv); c.set(new Uint8Array(data),12); return btoa(String.fromCharCode(...c)); };
const decrypt=async (ciph,pw)=>{ try{ const key=await deriveKey(pw), c=Uint8Array.from(atob(ciph),c=>c.charCodeAt(0)), iv=c.slice(0,12), data=c.slice(12); const d=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,data); return new TextDecoder().decode(d); }catch(e){ return "❌ Wrong key"; } };

// ---------- State ----------
let parts=[], nextId=1, history=[], chart=null, activeId=null, transEnabled=true, targetLang="en";

async function addTurn(name, cVal, transRes){
    let ts=null, al=cVal, drift=0;
    if(transEnabled && transRes){
        ts=transScore(transRes.trans,transRes.conf);
        al=align(cVal,ts);
        drift=cVal-cis(transRes.trans);
        speak(transRes.trans,targetLang);
    }
    let emaVal=updE(cVal);
    history.push({cis:cVal,ema:emaVal,transScore:ts,alignment:al,drift});
    if(chart){
        chart.data.labels=history.map((_,i)=>i+1);
        chart.data.datasets[0].data=history.map(h=>h.cis);
        chart.data.datasets[1].data=history.map(h=>h.ema);
        chart.data.datasets[2].data=history.map(h=>h.transScore);
        chart.data.datasets[3].data=history.map(h=>h.alignment);
        chart.data.datasets[4].data=history.map(()=>7);
        chart.update();
    }
    document.getElementById('turnCount').innerText=history.length;
    document.getElementById('emaScore').innerText=history.length?history[history.length-1].ema.toFixed(2):'—';
    document.getElementById('lastTS').innerText=history.length&&history[history.length-1].transScore!==undefined?history[history.length-1].transScore.toFixed(1):'—';
    document.getElementById('driftValue').innerText=drift.toFixed(2);
    let p=parts.find(p=>p.name===name); if(p){ p.lastCis=cVal; p.lastTrans=ts; updateCard(p); }
    let finalDrift=renderDeep(transRes?transRes.original:"(no text)", cVal, transRes?.trans, ts, al);
    if(document.getElementById('autoEncrypt').checked && transRes && transRes.original){
        try{ let pw=document.getElementById('roomKey').value||'radiant2026'; let ciph=await encrypt(transRes.original,pw); secureMsgs.push({sender:name,cipher:ciph,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}); renderSecure(); }catch(e){}
    }
}

// Speech recognition (simplified)
function createRecog(p){
    let R=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
    R.continuous=true; R.interimResults=false; R.lang=p.lang;
    R.onresult=async e=>{
        let final=""; for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)final+=e.results[i][0].transcript+" ";
        if(!final.trim())return;
        let score=cis(final), trans=null;
        if(transEnabled){ let tr=await translate(final,p.lang,targetLang); trans={trans:tr.trans,conf:tr.conf,original:final}; }
        await addTurn(p.name,score,trans);
        let pre=document.getElementById(`preview-${p.id}`); if(pre)pre.innerText=`💬 "${final.slice(0,55)}..."`;
        let td=document.getElementById(`trans-${p.id}`); if(td&&trans)td.innerText=`🌍 ➜ ${trans.trans.slice(0,55)}...`;
    };
    R.onerror=R.onend=()=>stop(p); return R;
}
async function start(p){ if(!p.recog)p.recog=createRecog(p); if(activeId&&activeId!==p.id)stop(parts.find(x=>x.id===activeId)); if(p.isListening)return; await p.recog.start(); p.isListening=true; activeId=p.id; updateStatus(p,"listening",true); updateButton(p,true); }
function stop(p){ if(p.recog&&p.isListening)try{p.recog.stop()}catch(e){} p.isListening=false; if(activeId===p.id)activeId=null; updateStatus(p,"stopped",false); updateButton(p,false); }
function updateStatus(p,t,a){ let s=document.getElementById(`status-${p.id}`); if(s)s.innerHTML=a?`🔴 ${t}`:`⏹️ ${t}`; }
function updateButton(p,a){ let b=document.getElementById(`btn-${p.id}`); if(b){ b.innerText=a?"⏹️ Stop":"🎤 Start"; b.classList.toggle("listening",a); } }
function updateCard(p){ let c=document.getElementById(`score-${p.id}`); if(c)c.innerText=`CIS: ${p.lastCis!==undefined?p.lastCis.toFixed(1):"—"}`; let t=document.getElementById(`tscore-${p.id}`); if(t)t.innerText=`🔁 ${p.lastTrans!==undefined?p.lastTrans.toFixed(1):"—"}`; }
function render(){ document.getElementById('participantsList').innerHTML=parts.map(p=>`<div class="card"><div class="row"><span class="name">${escapeHtml(p.name)}</span><span>🌐 ${p.lang.toUpperCase()}</span><button id="btn-${p.id}">🎤 Start</button></div><div class="row"><span class="status" id="status-${p.id}">⏹️ stopped</span><span class="badge" id="score-${p.id}">CIS: —</span><span class="badge" id="tscore-${p.id}">🔁 —</span><button id="remove-${p.id}" style="background:#f1f5f9;color:#1e293b">✖</button></div><div class="transcript" id="preview-${p.id}">💬 awaiting...</div><div class="transcript" id="trans-${p.id}" style="border-left-color:#9b59b6">🌍 translation...</div></div>`).join(''); parts.forEach(p=>{ document.getElementById(`btn-${p.id}`).onclick=()=>p.isListening?stop(p):start(p); document.getElementById(`remove-${p.id}`).onclick=()=>{ stop(p); parts=parts.filter(x=>x.id!==p.id); render(); }; }); }
const escapeHtml=s=>s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
function addPart(n,l){ let id=nextId++; let p={id,name:n.trim()||"Speaker",lang:l,isListening:false,recog:null,lastCis:null,lastTrans:null}; parts.push(p); p.recog=createRecog(p); render(); }
function resetAll(){ history=[]; ema=null; secureMsgs=[]; parts.forEach(p=>{p.lastCis=p.lastTrans=null;updateCard(p);}); if(chart){ chart.data.labels=[]; chart.data.datasets.forEach(d=>d.data=[]); chart.update(); } document.getElementById('turnCount').innerText='0'; document.getElementById('emaScore').innerText='—'; document.getElementById('lastTS').innerText='—'; document.getElementById('driftValue').innerText='0.0'; document.getElementById('secureCount').innerText='0'; document.getElementById('interpretationBox').innerHTML='Awaiting speech...'; renderSecure(); }
function stopAll(){ parts.forEach(stop); }
function renderSecure(){ let html=secureMsgs.length?secureMsgs.map((m,i)=>`<div class="secure-card"><div class="row"><span class="name">${escapeHtml(m.sender)}</span><span>${m.time}</span></div><code>${m.cipher.slice(0,60)}…</code><button onclick="decryptMsg(${i},this)" style="margin-top:6px;background:#10b981">🔓 Decrypt</button><div class="decrypted-result" style="display:none"></div></div>`).join(''):'<p style="color:#666;text-align:center;padding:20px">🔒 Vault empty</p>'; document.getElementById('secureMessages').innerHTML=html; document.getElementById('secureCount').innerText=secureMsgs.length; }
window.decryptMsg=async(i,btn)=>{ const pw=document.getElementById('roomKey').value||'radiant2026'; const plain=await decrypt(secureMsgs[i].cipher,pw); const ddiv=btn.parentNode.querySelector('.decrypted-result'); ddiv.innerHTML=`<strong>Plain:</strong> ${plain}`; ddiv.style.display='block'; btn.style.display='none'; };

// ---------- Init ----------
window.onload=()=>{
    chart=new Chart(document.getElementById('graph'),{
        type:'line',
        data:{labels:[], datasets:[
            {label:'CIS', data:[], borderColor:'#2c7da0', borderWidth:3},
            {label:'EMA', data:[], borderColor:'#e9b35f', borderWidth:3, borderDash:[5,5]},
            {label:'Translation', data:[], borderColor:'#9b59b6', borderWidth:2, hidden:true},
            {label:'Alignment', data:[], borderColor:'#10b981', borderWidth:2, borderDash:[2,4]},
            {label:'Threshold (7.0)', data:[], borderColor:'#dc2626', borderWidth:2, borderDash:[6,4], pointRadius:0}
        ]},
        options:{responsive:true, scales:{y:{min:0,max:10}}}
    });
    addPart("You","en"); addPart("Caller 1","es");
    document.getElementById('transToggle').onchange=e=>transEnabled=e.target.checked;
    document.getElementById('targetLang').onchange=e=>targetLang=e.target.value;
    document.getElementById('addBtn').onclick=()=>{ let n=document.getElementById('newName').value||'Speaker'; addPart(n,document.getElementById('newLang').value); };
    document.getElementById('resetBtn').onclick=resetAll;
    document.getElementById('stopAllBtn').onclick=stopAll;
    document.getElementById('encryptSend').onclick=async()=>{ let msg=document.getElementById('secureMsg').value.trim(); if(!msg)return; const pw=document.getElementById('roomKey').value||'radiant2026'; const ciph=await encrypt(msg,pw); secureMsgs.push({sender:"You",cipher:ciph,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}); renderSecure(); document.getElementById('secureMsg').value=''; };
    document.getElementById('regenKey').onclick=()=>{ let k=""; for(let i=0;i<16;i++) k+="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789".charAt(Math.floor(Math.random()*62)); document.getElementById('roomKey').value=k; alert("New key:\n"+k); };
    document.getElementById('simulateCall').onclick=async()=>{ if(!parts.length)return; let p=parts[Math.floor(Math.random()*parts.length)]; let txt="Test of convergence and stability in monotone operators."; let score=cis(txt); let trans=null; if(transEnabled){ let tr=await translate(txt,p.lang,targetLang); trans={trans:tr.trans,conf:tr.conf,original:txt}; } await addTurn(p.name,score,trans); };
    document.getElementById('clearSecure').onclick=()=>{ secureMsgs=[]; renderSecure(); };
    renderSecure();
};
</script>
</body>
    </html>
