<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Protocol – AI + Transaction</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <style>
        *{box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:#f0f2f5;margin:0;padding:20px;}
        .container{max-width:1200px;margin:auto;background:white;border-radius:28px;padding:20px;box-shadow:0 12px 30px rgba(0,0,0,0.1);}
        .flex{display:flex;gap:24px;flex-wrap:wrap;}
        .chat-panel{flex:2;min-width:280px;}
        .tx-panel{flex:1;min-width:260px;background:#f8f9fc;border-radius:20px;padding:16px;border:1px solid #e2e8f0;}
        .user-info{background:#e6f0ff;border-radius:16px;padding:12px;margin-bottom:16px;}
        button, input, select, textarea{padding:8px 12px;border-radius:30px;border:1px solid #cbd5e1;}
        button{background:#1a2a3a;color:white;cursor:pointer;}
        button:disabled{background:#b0c4de;}
        .chat-messages{height:300px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:20px;padding:12px;margin-bottom:12px;background:#fff;}
        .message{margin-bottom:10px;padding:6px 12px;border-radius:18px;max-width:80%;}
        .user-message{background:#e6f7e6;margin-left:auto;}
        .ai-message{background:#f1f5f9;}
        .cis-score{font-size:0.7rem;color:#5a6e85;}
        canvas{max-height:180px;width:100%;margin-top:12px;}
        .toggle-switch{display:flex;align-items:center;gap:10px;margin:10px 0;flex-wrap:wrap;}
        .public-users{max-height:150px;overflow-y:auto;margin-top:8px;}
        .public-user{cursor:pointer;padding:6px;border-bottom:1px solid #e2e8f0;}
        .note{font-size:0.7rem;color:#7f8c8d;margin-top:12px;}
        hr{margin:16px 0;}
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ Radiant Protocol – AI + Fee Game</h1>
    <div class="flex">
        <!-- CHAT PANEL -->
        <div class="chat-panel">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="flex" style="gap:8px; margin-bottom:8px;">
                <textarea id="userInput" rows="1" style="flex:1;" placeholder="Message..."></textarea>
                <button id="sendBtn">Send</button>
            </div>
            <div class="toggle-switch">
                <input type="checkbox" id="premiumToggle" disabled>
                <label>✨ Premium AI (1000 pts/day)</label>
                <span id="pointsDisplay" style="margin-left:auto;">Points: 0</span>
            </div>
            <div class="user-info">
                <strong>Your Stats</strong><br>
                <div id="userStats"></div>
                <div id="premiumStatus"></div>
            </div>
            <canvas id="historyChart"></canvas>
            <div class="toggle-switch">
                <label>Compare:</label>
                <select id="compareSelect"><option value="none">None</option></select>
            </div>
            <div id="compareContainer"></div>
        </div>

        <!-- TRANSACTION PANEL (Architect Fee) -->
        <div class="tx-panel">
            <h3>💰 Architect Fee (50%)</h3>
            <div id="txAccountInfo"></div>
            <div id="txRecordInfo"></div>
            <input type="text" id="recipient" placeholder="Recipient address">
            <input type="number" id="amount" step="0.0001" placeholder="Amount (tokens)">
            <button id="sendTxBtn" disabled>Send Transaction</button>
            <div id="txStatus" class="note"></div>
            <hr>
            <div><strong>👥 Public Users (Top 5)</strong></div>
            <div id="publicUsersList" class="public-users"></div>
            <div class="note">💡 First month free. 1000 total CIS renews premium.</div>
        </div>
    </div>
</div>

<script>
    // ========== IndexedDB ==========
    const DB_NAME = "RadiantAI_DB";
    let db;
    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 2);
            req.onerror = () => reject(req.error);
            req.onsuccess = () => { db = req.result; resolve(db); };
            req.onupgradeneeded = (e) => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains("users")) d.createObjectStore("users", { keyPath: "id" });
                if (!d.objectStoreNames.contains("conv")) d.createObjectStore("conv", { keyPath: "id", autoIncrement: true });
            };
        });
    }
    async function store(storeName, mode) { if (!db) await openDB(); return db.transaction(storeName, mode).objectStore(storeName); }
    async function saveUser(u) { return (await store("users", "readwrite")).put(u); }
    async function getUser(id) { return (await store("users")).get(id); }
    async function getAllUsers() { return (await store("users")).getAll(); }
    async function saveConv(c) { return (await store("conv", "readwrite")).add(c); }
    async function getConvs(uid) { const all = await (await store("conv")).getAll(); return all.filter(c => c.userId === uid); }

    // ========== Global state ==========
    let currentUser = null, convs = [], chat = [], points = 0, premiumActive = false, premiumExpiry = null, lastPointsDay = null;
    let historyChart = null, compareChart = null;

    // ========== Helper ==========
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function computeCIS(msg) { return Math.min(10, 5 + (msg.length>20?1:0) + (msg.includes('?')?1:0) + Math.random()*1.5); }
    async function generateResponse(userMsg, cis) {
        let resp = "I understand. Could you elaborate?";
        if (premiumActive && document.getElementById('premiumToggle').checked) resp = "✨ Premium: " + resp + " Deeper insight added.";
        return resp;
    }
    function renderChat() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = chat.map(m => `<div class="message ${m.sender==='user'?'user-message':'ai-message'}">
            <strong>${m.sender==='user'?'You':'AI'}</strong><div>${escapeHtml(m.text)}</div>${m.cis?`<div class="cis-score">CIS: ${m.cis.toFixed(2)}</div>`:''}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    }
    async function addMessage(sender, text, cis=null) {
        const msg = { sender, text, timestamp: Date.now(), cis };
        chat.push(msg);
        await saveConv({ userId: currentUser.id, sender, text, cis, timestamp: Date.now() });
        convs.push({ userId: currentUser.id, sender, text, cis, timestamp: Date.now() });
        renderChat();
        updateGraphs();
    }

    // ========== Points & Premium ==========
    async function updatePremium() {
        if (!currentUser) return;
        const now = Date.now();
        if (!premiumActive && currentUser.freeMonthExpiry && now > currentUser.freeMonthExpiry) {
            if ((currentUser.totalCIS||0) >= 1000) {
                currentUser.freeMonthExpiry = now + 30*86400000;
                await saveUser(currentUser);
                premiumActive = true;
                premiumExpiry = currentUser.freeMonthExpiry;
                document.getElementById('premiumStatus').innerHTML = `<span style="color:green;">✅ Premium until ${new Date(premiumExpiry).toLocaleDateString()}</span>`;
            } else {
                premiumActive = false;
                document.getElementById('premiumStatus').innerHTML = `<span style="color:red;">❌ Trial expired. Need 1000 total CIS.</span>`;
            }
        } else if (premiumActive) {
            const today = new Date().toISOString().slice(0,10);
            const toggle = document.getElementById('premiumToggle');
            if (lastPointsDay !== today && toggle.checked && premiumActive) {
                if (points >= 1000) {
                    points -= 1000;
                    lastPointsDay = today;
                    currentUser.points = points;
                    await saveUser(currentUser);
                    document.getElementById('pointsDisplay').innerText = `Points: ${points.toFixed(0)}`;
                } else {
                    alert("Not enough points for Premium today.");
                    toggle.checked = false;
                }
            }
        }
        document.getElementById('pointsDisplay').innerText = `Points: ${points.toFixed(0)}`;
        document.getElementById('premiumToggle').disabled = !premiumActive;
    }

    // ========== Graphs ==========
    function getScores(uid) { return convs.filter(c => c.userId === uid && c.cis !== null).map(c => c.cis); }
    function renderHistory() {
        const scores = getScores(currentUser.id);
        const ctx = document.getElementById('historyChart').getContext('2d');
        if (historyChart) historyChart.destroy();
        historyChart = new Chart(ctx, { type: 'line', data: { labels: scores.map((_,i)=>i+1), datasets: [{ label: 'Your CIS', data: scores, borderColor: '#1a2a3a', fill: false }] }, options: { responsive: true, scales: { y: { min: 0, max: 10 } } } });
    }
    async function renderComparison() {
        const compareId = document.getElementById('compareSelect').value;
        if (!compareId || compareId === 'none') { if(compareChart) compareChart.destroy(); document.getElementById('compareContainer').innerHTML = ''; return; }
        const other = await getUser(compareId);
        if (!other) return;
        const otherScores = getScores(compareId);
        const myScores = getScores(currentUser.id);
        const maxLen = Math.max(myScores.length, otherScores.length);
        const labels = Array.from({ length: maxLen }, (_,i)=>i+1);
        const container = document.getElementById('compareContainer');
        container.innerHTML = '<canvas id="compareCanvas"></canvas>';
        const ctx = document.getElementById('compareCanvas').getContext('2d');
        if (compareChart) compareChart.destroy();
        compareChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'You', data: myScores, borderColor: '#2e7d32' }, { label: other.name, data: otherScores, borderColor: '#1976d2' }] }, options: { responsive: true, scales: { y: { min: 0, max: 10 } } } });
    }
    function updateGraphs() { renderHistory(); renderComparison(); }

    // ========== Public Users ==========
    async function updatePublicUsers() {
        const all = await getAllUsers();
        const withScores = [];
        for (const u of all) {
            const scores = getScores(u.id);
            const total = scores.reduce((a,b)=>a+b,0);
            withScores.push({ ...u, totalCIS: total });
        }
        withScores.sort((a,b)=>b.totalCIS - a.totalCIS);
        const top5 = withScores.slice(0,5);
        const container = document.getElementById('publicUsersList');
        container.innerHTML = top5.map(u => `<div class="public-user" data-id="${u.id}">${escapeHtml(u.name)} - CIS: ${u.totalCIS.toFixed(0)}</div>`).join('');
        document.querySelectorAll('.public-user').forEach(el => {
            el.onclick = () => {
                const uid = el.getAttribute('data-id');
                const sel = document.getElementById('compareSelect');
                if (![...sel.options].some(o=>o.value===uid)) sel.add(new Option(`Compare with ${el.innerText.split(' -')[0]}`, uid));
                sel.value = uid;
                renderComparison();
            };
        });
    }

    // ========== Send Message ==========
    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        await addMessage('user', text);
        const cis = computeCIS(text);
        currentUser.totalCIS = (currentUser.totalCIS||0) + cis;
        points += cis;
        currentUser.points = points;
        await saveUser(currentUser);
        const aiResp = await generateResponse(text, cis);
        await addMessage('ai', aiResp, cis);
        await updatePremium();
        document.getElementById('userStats').innerHTML = `Name: ${escapeHtml(currentUser.name)}<br>Total CIS: ${(currentUser.totalCIS||0).toFixed(2)}<br>Free until: ${currentUser.freeMonthExpiry?new Date(currentUser.freeMonthExpiry).toLocaleDateString():'—'}`;
        await updatePublicUsers();
        updateGraphs();
    };

    // ========== Transaction Panel ==========
    const TOKEN_ADDR = "0xYourTokenAddress";        // replace
    const FEE_CONTRACT_ADDR = "0xYourFeeContractAddress";
    const ERC20_ABI = ["function approve(address,uint256)","function balanceOf(address) view returns (uint256)","function decimals() view returns (uint8)"];
    const FEE_ABI = ["function transferWithFee(address,uint256)","function lastArchitectTransactionAmount() view returns (uint256)","function architect() view returns (address)"];
    let provider, signer, token, feeContract, userAddr;
    async function initTx() {
        if (!window.ethereum) { alert("MetaMask required"); return; }
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        userAddr = await signer.getAddress();
        token = new ethers.Contract(TOKEN_ADDR, ERC20_ABI, signer);
        feeContract = new ethers.Contract(FEE_CONTRACT_ADDR, FEE_ABI, signer);
        document.getElementById('txAccountInfo').innerHTML = `<strong>Your address:</strong> ${userAddr.slice(0,6)}...${userAddr.slice(-4)}`;
        await updateRecord();
        document.getElementById('sendTxBtn').disabled = false;
    }
    async function updateRecord() {
        const record = await feeContract.lastArchitectTransactionAmount();
        const arch = await feeContract.architect();
        const dec = await token.decimals();
        document.getElementById('txRecordInfo').innerHTML = `<div><strong>Architect:</strong> ${arch}</div><div><strong>Last record:</strong> ${ethers.formatUnits(record, dec)} tokens</div>`;
    }
    document.getElementById('sendTxBtn').onclick = async () => {
        const recipient = document.getElementById('recipient').value.trim();
        const amountStr = document.getElementById('amount').value;
        if (!recipient || !amountStr || amountStr<=0) { alert("Invalid input"); return; }
        const dec = await token.decimals();
        const amount = ethers.parseUnits(amountStr, dec);
        const fee = amount * 50n / 100n;
        const total = amount + fee;
        const balance = await token.balanceOf(userAddr);
        if (balance < total) { alert(`Insufficient balance. Need ${ethers.formatUnits(total, dec)} tokens`); return; }
        const approveTx = await token.approve(FEE_CONTRACT_ADDR, total);
        await approveTx.wait();
        const tx = await feeContract.transferWithFee(recipient, amount);
        await tx.wait();
        document.getElementById('txStatus').innerHTML = `✅ Tx sent: ${tx.hash.slice(0,10)}...`;
        await updateRecord();
    };

    // ========== Initialization ==========
    (async () => {
        await openDB();
        let userId = localStorage.getItem('radiant_user_id');
        if (userId) currentUser = await getUser(userId);
        if (!currentUser) {
            let name = prompt("Enter your name:", "Explorer") || "Explorer";
            currentUser = { id: Date.now().toString(), name, totalCIS: 0, points: 0, freeMonthExpiry: Date.now() + 30*86400000 };
            await saveUser(currentUser);
            localStorage.setItem('radiant_user_id', currentUser.id);
        }
        points = currentUser.points || 0;
        premiumActive = currentUser.freeMonthExpiry && Date.now() < currentUser.freeMonthExpiry;
        convs = await getConvs(currentUser.id);
        convs.sort((a,b)=>a.timestamp-b.timestamp);
        chat = convs.map(c => ({ sender: c.sender, text: c.text, cis: c.cis }));
        renderChat();
        document.getElementById('userStats').innerHTML = `Name: ${escapeHtml(currentUser.name)}<br>Total CIS: ${(currentUser.totalCIS||0).toFixed(2)}<br>Free until: ${currentUser.freeMonthExpiry?new Date(currentUser.freeMonthExpiry).toLocaleDateString():'—'}`;
        await updatePremium();
        await updatePublicUsers();
        updateGraphs();
        await initTx();
    })().catch(console.error);
</script>
</body>
</html>
