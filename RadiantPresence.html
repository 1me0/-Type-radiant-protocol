<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Protocol – Proof of Presence (Persistent + On‑Chain)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a1a2a 0%, #1a2a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a2a3a, #2c5a7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0;
            margin-bottom: 8px;
        }
        .sub {
            color: #5a6e85;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        .presence-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: all 0.2s;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #2c7a4d;
            box-shadow: 0 0 0 3px rgba(44,122,77,0.2);
        }
        button {
            background: #1a2a3a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }
        button:hover {
            background: #2c4a6a;
        }
        .btn-secondary {
            background: #2c5a7a;
        }
        .btn-secondary:hover {
            background: #1e3a5a;
        }
        .score-panel {
            background: #f0f4f8;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        .score-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4a5a6a;
            margin-bottom: 8px;
        }
        .score-value {
            font-size: 3.2rem;
            font-weight: 800;
            font-family: monospace;
            color: #2c7a4d;
        }
        .score-description {
            font-size: 0.75rem;
            color: #5a6e85;
            margin-top: 8px;
        }
        .wallet-badge {
            background: #e6f0ff;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.7rem;
            display: inline-block;
            word-break: break-all;
            max-width: 100%;
            margin-top: 10px;
        }
        .timestamp {
            font-size: 0.7rem;
            color: #6c8ea0;
            margin-top: 8px;
        }
        footer {
            font-size: 0.7rem;
            color: #8a9aaa;
            margin-top: 24px;
            text-align: center;
        }
        .status {
            font-size: 0.75rem;
            margin-top: 12px;
            padding: 8px;
            border-radius: 20px;
            background: #e8f0f8;
            color: #2c5a7a;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="presence-icon">✨</div>
    <h1>Proof of Presence</h1>
    <div class="sub">Persistent identity · Time‑stamped · On‑chain ready</div>

    <input type="text" id="userInput" placeholder="Wallet address or name (e.g., 0x... or @username)" autocomplete="off">
    <button id="registerBtn">⚡ Register Presence (Local)</button>
    <button id="onchainBtn" class="btn-secondary">🌐 Register On‑Chain (MetaMask)</button>

    <div class="score-panel" id="scorePanel" style="display: none;">
        <div class="score-label">Your Presence Score</div>
        <div class="score-value" id="scoreValue">—</div>
        <div class="score-description" id="scoreDesc">Proof of your unique signature</div>
        <div class="wallet-badge" id="walletBadge"></div>
        <div class="timestamp" id="timestampDisplay"></div>
    </div>

    <div class="status" id="statusMsg">Ready. Enter your identifier.</div>
    <footer>
        🔒 Stored locally · First registration timestamp recorded · On‑chain option available
    </footer>
</div>

<script>
    // Helper: deterministic hash (djb2) to generate a score between 0-100
    function hashStringToScore(str) {
        let hash = 5381;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) + hash) + str.charCodeAt(i);
            hash = hash & hash; // keep 32-bit
        }
        return Math.abs(hash % 101);
    }

    // Load presence data from localStorage
    function loadPresence() {
        const storedName = localStorage.getItem('radiant_presence_name');
        const storedScore = localStorage.getItem('radiant_presence_score');
        const storedTimestamp = localStorage.getItem('radiant_presence_timestamp');
        if (storedName && storedScore !== null) {
            document.getElementById('userInput').value = storedName;
            document.getElementById('scoreValue').innerText = storedScore;
            document.getElementById('walletBadge').innerText = storedName.length > 20 ? storedName.slice(0,18)+'...' : storedName;
            if (storedTimestamp) {
                const date = new Date(parseInt(storedTimestamp));
                document.getElementById('timestampDisplay').innerHTML = `🕒 First registered: ${date.toLocaleString()}`;
            } else {
                document.getElementById('timestampDisplay').innerHTML = '';
            }
            document.getElementById('scorePanel').style.display = 'block';
            updateScoreDescription(parseInt(storedScore));
            return true;
        }
        return false;
    }

    function updateScoreDescription(score) {
        let desc = '';
        if (score >= 90) desc = '🌟 Legendary presence';
        else if (score >= 70) desc = '✨ Strong resonance';
        else if (score >= 50) desc = '🔹 Verified entity';
        else desc = '🔸 Emerging presence';
        document.getElementById('scoreDesc').innerText = desc;
    }

    // Register presence (local storage, with timestamp only on first creation)
    function registerPresence() {
        const input = document.getElementById('userInput').value.trim();
        if (input === "") {
            alert("Please enter a wallet address or name.");
            return;
        }
        const existingName = localStorage.getItem('radiant_presence_name');
        const score = hashStringToScore(input);
        let timestamp = localStorage.getItem('radiant_presence_timestamp');
        if (!timestamp || existingName !== input) {
            // New registration or different identifier → store new timestamp
            timestamp = Date.now().toString();
            localStorage.setItem('radiant_presence_timestamp', timestamp);
        }
        localStorage.setItem('radiant_presence_name', input);
        localStorage.setItem('radiant_presence_score', score);

        document.getElementById('scoreValue').innerText = score;
        document.getElementById('walletBadge').innerText = input.length > 20 ? input.slice(0,18)+'...' : input;
        const date = new Date(parseInt(timestamp));
        document.getElementById('timestampDisplay').innerHTML = `🕒 First registered: ${date.toLocaleString()}`;
        document.getElementById('scorePanel').style.display = 'block';
        updateScoreDescription(score);
        document.getElementById('statusMsg').innerHTML = '✅ Presence registered locally. Ready for on‑chain anchoring.';
        setTimeout(() => {
            if (document.getElementById('statusMsg').innerHTML.includes('✅')) {
                document.getElementById('statusMsg').innerHTML = 'Ready.';
            }
        }, 3000);
    }

    // Simulate / actually register on‑chain via MetaMask
    async function registerOnChain() {
        const input = document.getElementById('userInput').value.trim();
        if (input === "") {
            alert("Please enter your identifier first.");
            return;
        }
        const score = localStorage.getItem('radiant_presence_score');
        const timestamp = localStorage.getItem('radiant_presence_timestamp');
        if (!score || !timestamp) {
            alert("Please register presence locally first (click 'Register Presence (Local)').");
            return;
        }

        // Check if MetaMask is installed
        if (typeof window.ethereum !== 'undefined') {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const address = await signer.getAddress();

                // Here you would call your smart contract, e.g.:
                // const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                // const tx = await contract.registerPresence(input, score, timestamp);
                // await tx.wait();

                // For demo, simulate a transaction
                document.getElementById('statusMsg').innerHTML = '⏳ Simulating on‑chain registration...';
                await new Promise(resolve => setTimeout(resolve, 2000));
                document.getElementById('statusMsg').innerHTML = `✅ On‑chain presence registered for ${address.slice(0,6)}...${address.slice(-4)}. Score: ${score}`;
                // You could store a flag in localStorage to mark that it's been anchored
                localStorage.setItem('radiant_presence_anchored', 'true');
            } catch (error) {
                console.error(error);
                document.getElementById('statusMsg').innerHTML = '❌ Transaction failed or user rejected.';
            }
        } else {
            alert("MetaMask not detected. Please install MetaMask to use on‑chain registration.");
        }
    }

    // Attach event listeners
    document.getElementById('registerBtn').addEventListener('click', registerPresence);
    document.getElementById('onchainBtn').addEventListener('click', registerOnChain);
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') registerPresence();
    });

    // Load existing presence on page load
    loadPresence();

    // Optional: show hint if MetaMask is available
    if (typeof window.ethereum !== 'undefined') {
        document.getElementById('statusMsg').innerHTML = 'MetaMask detected. You can anchor your presence on‑chain.';
    } else {
        document.getElementById('statusMsg').innerHTML = 'Install MetaMask to use on‑chain presence anchoring.';
    }
</script>
<!-- Ethers.js for on‑chain interaction -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</body>
</html>
