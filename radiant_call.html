<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Interpreter · CIS + Deep Meaning</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:#eef2f5;margin:0;padding:20px;}
        .grid{display:flex;flex-wrap:wrap;gap:20px;max-width:1400px;margin:auto;}
        .panel{background:white;border-radius:24px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .participants{flex:1.2;min-width:260px;}
        .chart-panel{flex:1.5;}
        .deep-panel{flex:1.3;background:#fef9e3;border-left:4px solid #f59e0b;}
        h3{margin:0 0 12px;border-left:4px solid #2c7da0;padding-left:12px;}
        .card{background:#f9fbfd;border-radius:16px;padding:10px;margin-bottom:12px;border:1px solid #e2e8f0;}
        .row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
        .name{font-weight:700;background:#eef2ff;padding:2px 12px;border-radius:40px;font-size:0.9rem;}
        button{background:#1e4663;border:none;color:white;padding:4px 12px;border-radius:40px;cursor:pointer;font-size:0.8rem;}
        button.listening{background:#c2410c;}
        .status,.badge{font-size:0.7rem;background:#eef2ff;padding:2px 10px;border-radius:20px;}
        .transcript{font-size:0.7rem;background:#f8fafc;border-radius:12px;padding:5px;margin-top:6px;border-left:3px solid #2c7da0;}
        .add-bar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
        input,select{padding:4px 8px;border-radius:40px;border:1px solid #cbd5e1;font-size:0.8rem;}
        canvas{max-height:260px;width:100%;}
        .summary{display:flex;justify-content:space-between;margin-top:12px;background:#eef2ff;border-radius:20px;padding:4px 10px;font-size:0.7rem;}
        .interpretation-box{background:#fff8e7;border-radius:16px;padding:10px;font-size:0.75rem;max-height:500px;overflow-y:auto;}
        .int-section{margin-bottom:8px;border-bottom:1px dashed #e2d5b6;padding-bottom:6px;}
        .section-title{font-weight:bold;color:#b45309;}
        .translator{background:#fef9e3;border-radius:20px;padding:8px;margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;}
    </style>
</head>
<body>
<div class="grid">
    <div class="panel participants">
        <h3>🎙️ Radiant Interpreter</h3>
        <div class="translator">
            <label><input type="checkbox" id="transToggle" checked> 🌐 Live translation + deep meaning</label>
            <select id="targetLang"><option value="en">English</option><option value="sw">Swahili (expressive)</option><option value="es">Spanish</option><option value="fr">French</option></select>
        </div>
        <div id="participantsList"></div>
        <div class="add-bar">
            <input type="text" id="newName" placeholder="Name" value="Speaker">
            <select id="newLang"><option value="en">en</option><option value="sw">sw</option><option value="es">es</option></select>
            <button id="addBtn">+ Add</button>
            <button id="resetBtn" style="background:#94a3b8;">Reset</button>
            <button id="stopAllBtn" style="background:#94a3b8;">Stop all</button>
        </div>
        <div class="summary"><span>📊 Turns: <strong id="turnCount">0</strong></span><span>🌍 EMA: <strong id="emaScore">—</strong></span><span>🎧 Trans: <strong id="lastTS">—</strong></span></div>
    </div>
    <div class="panel chart-panel">
        <h3>📈 CIS & Translation</h3>
        <canvas id="graph"></canvas>
    </div>
    <div class="panel deep-panel">
        <h3>🧠 Deep Interpretation (0‑10)</h3>
        <div id="interpretationBox" class="interpretation-box">Awaiting speech...</div>
    </div>
</div>

<script>
// ---------- CIS (0‑10) ----------
function cis(text){
    let w=(text||"").toLowerCase().match(/\b[\w']+\b/g)||[];
    if(!w.length) return 0;
    let u=new Set(w), ttr=u.size/w.length, f=new Map();
    w.forEach(v=>f.set(v,(f.get(v)||0)+1));
    let H=0; for(let c of f.values()){let p=c/w.length; H-=p*Math.log2(p);}
    let Hnorm=Math.log2(u.size+1e-6)?Math.min(1,H/Math.log2(u.size+1e-6)):0;
    let raw=0.4*Hnorm+0.4*ttr+0.2*Math.min(1,w.length/15);
    return Math.min(10,Math.max(0,+(10*Math.tanh(1.8*raw)).toFixed(2)));
}
let ema=null;
function updEMA(v){ ema=ema===null?v:0.3*v+0.7*ema; return ema; }

// ---------- Translation (MyMemory) + Swahili expressive enhancement ----------
async function translate(txt,src,tgt){
    if(!txt.trim() || src===tgt) return {trans:txt,conf:1};
    let url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(txt)}&langpair=${src}|${tgt}`;
    let r=await fetch(url), d=await r.json();
    let trans=d.responseData.translatedText.replace(/&quot;/g,'"'), conf=d.responseData.match?d.responseData.match/100:0.7;
    conf=Math.min(0.99,Math.max(0.3,conf));
    if(tgt==='sw'){ // expressive enhancement for Swahili
        if(txt.match(/\b(Lyapunov|convergence|gradient|algorithm)\b/i))
            trans+=" (Hii inamaanisha: mfumo unapunguza makosa hatua kwa hatua, hakuna kurudi nyuma, mwisho utulivu unafikiwa.)";
        else if(trans.split(/\s+/).length<4) trans+=" – Kuna maana ndani, si maneno tu.";
    }
    return {trans,conf};
}
function transScore(txt,conf){ return txt&&!txt.includes("error")?Math.min(10,+(10*(conf*0.7+Math.min(1,txt.split(/\s+/).length/20)*0.3)).toFixed(2)):0; }
function speak(txt,lang){ let u=new SpeechSynthesisUtterance(txt); u.lang=lang; speechSynthesis.cancel(); speechSynthesis.speak(u); }

// ---------- Deep Interpretation (6 steps) ----------
function deepInterpretation(orig, cisVal, transTxt, tLang){
    let words=orig.split(/\s+/);
    let coreInt=`Recognised ${words.length} words. CIS clarity: ${cisVal>7?'high':(cisVal>4?'moderate':'low')}.`;
    let coreTrans=`Direct translation: "${transTxt}" (CIS ${cisVal.toFixed(1)})`;
    let standard="Standard vocabulary present.";
    let isNew=cisVal>8?"Novel insight detected.":"No radically new concepts.";
    let important=cisVal>6?"Contributes to alignment.":"Minor contribution.";
    let just=`CIS ${cisVal.toFixed(1)} – ${cisVal>7?'strong coherence':(cisVal>4?'acceptable':'distortion')}. Example: "${orig}" – ${cisVal>7?'clear':(cisVal>4?'needs polish':'rephrase')}.`;
    let abs="What is, is — regardless of recognition. Truth emerges from structure of thought, not language.";
    if(cisVal>=9) abs="Perfect alignment: statement reflects universal invariant.";
    else if(cisVal>=7) abs="Strong resonance: core idea survives translation.";
    let verdict=`Verdict: CIS ${cisVal.toFixed(1)}. ${cisVal>=8?'Excellent – reference quality.':(cisVal>=5?'Adequate – refine for impact.':'Low clarity – restructure.')}`;
    return {coreInt,coreTrans,standard,isNew,important,just,abs,verdict};
}
function renderDeep(orig, cisVal, transTxt, tLang){
    let d=deepInterpretation(orig,cisVal,transTxt,tLang);
    document.getElementById('interpretationBox').innerHTML=`
        <div class="int-section"><span class="section-title">📖 1. Core interpretation</span><br>${d.coreInt}</div>
        <div class="int-section"><span class="section-title">🌍 2. Core translation</span><br>${d.coreTrans}</div>
        <div class="int-section"><span class="section-title">🔍 3. Reflection</span><br><strong>Standard:</strong> ${d.standard}<br><strong>New:</strong> ${d.isNew}<br><strong>Important:</strong> ${d.important}</div>
        <div class="int-section"><span class="section-title">⚙️ 4. Justification</span><br>${d.just}</div>
        <div class="int-section"><span class="section-title">🌀 5. Abstraction</span><br>${d.abs}</div>
        <div class="int-section"><span class="section-title">🎯 6. Verdict</span><br>${d.verdict}</div>
    `;
}

// ---------- State ----------
let parts=[], nextId=1, history=[], chart=null, activeId=null, transEnabled=true, targetLang="en";
async function addTurn(name, cisVal, transRes=null){
    let transSc=null;
    if(transEnabled && transRes && transRes.trans){
        transSc=transScore(transRes.trans,transRes.conf);
        if(transRes.trans && !transRes.trans.includes("error")) speak(transRes.trans,targetLang);
    }
    let emaVal=updEMA(cisVal);
    history.push({cis:cisVal,ema:emaVal,transScore:transSc});
    if(chart){
        chart.data.labels=history.map((_,i)=>i+1);
        chart.data.datasets[0].data=history.map(h=>h.cis);
        chart.data.datasets[1].data=history.map(h=>h.ema);
        chart.data.datasets[2].data=history.map(h=>h.transScore);
        chart.data.datasets[2].hidden=!history.some(h=>h.transScore!==undefined);
        chart.update();
    }
    document.getElementById('turnCount').innerText=history.length;
    document.getElementById('emaScore').innerText=history.length?history[history.length-1].ema.toFixed(2):'—';
    document.getElementById('lastTS').innerText=history.length&&history[history.length-1].transScore!==undefined?history[history.length-1].transScore.toFixed(1):'—';
    let p=parts.find(p=>p.name===name);
    if(p){ p.lastCis=cisVal; p.lastTrans=transSc; updateCard(p); }
    if(transRes && transRes.original) renderDeep(transRes.original, cisVal, transRes.trans, targetLang);
}

// ---------- Speech Recognition ----------
function createRecog(p){
    let R=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    R.continuous=true; R.interimResults=false; R.lang=p.lang;
    R.onresult=async e=>{
        let final=""; for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)final+=e.results[i][0].transcript+" ";
        if(!final.trim())return;
        let score=cis(final), trans=null;
        if(transEnabled){
            let tr=await translate(final,p.lang,targetLang);
            trans={trans:tr.trans, conf:tr.conf, original:final};
        }
        await addTurn(p.name,score,trans);
        let pre=document.getElementById(`preview-${p.id}`); if(pre)pre.innerText=`💬 "${final.slice(0,55)}"`;
        let td=document.getElementById(`trans-${p.id}`); if(td&&trans) td.innerText=`🌍 ➜ ${trans.trans.slice(0,55)}`;
    };
    R.onerror=()=>stop(p); R.onend=()=>{if(p.isListening){p.isListening=false;if(activeId===p.id)activeId=null;updateStatus(p,"stopped",false);updateButton(p,false);}};
    return R;
}
async function start(p){ if(!p.recog)p.recog=createRecog(p); if(activeId&&activeId!==p.id)stop(parts.find(x=>x.id===activeId)); if(p.isListening)return; await p.recog.start(); p.isListening=true; activeId=p.id; updateStatus(p,"listening",true); updateButton(p,true); }
function stop(p){ if(p.recog&&p.isListening)try{p.recog.stop();}catch(e){} p.isListening=false; if(activeId===p.id)activeId=null; updateStatus(p,"stopped",false); updateButton(p,false); }

// ---------- UI ----------
function updateStatus(p,text,active){ let s=document.getElementById(`status-${p.id}`); if(s)s.innerHTML=active?`🔴 ${text}`:`⏹️ ${text}`; }
function updateButton(p,active){ let b=document.getElementById(`btn-${p.id}`); if(b){b.innerText=active?"⏹️ Stop":"🎤 Start"; b.classList.toggle("listening",active);} }
function updateCard(p){ let c=document.getElementById(`score-${p.id}`); if(c)c.innerText=`CIS: ${p.lastCis!==undefined?p.lastCis.toFixed(1):"—"}`; let t=document.getElementById(`tscore-${p.id}`); if(t)t.innerText=`🔁 Trans: ${p.lastTrans!==undefined?p.lastTrans.toFixed(1):"—"}`; }
function render(){
    document.getElementById('participantsList').innerHTML=parts.map(p=>`
        <div class="card"><div class="row"><span class="name">${escapeHtml(p.name)}</span><span>🌐 ${p.lang.toUpperCase()}</span><button id="btn-${p.id}">🎤 Start</button></div>
        <div class="row"><span class="status" id="status-${p.id}">⏹️ stopped</span><span class="badge" id="score-${p.id}">CIS: —</span><span class="badge" id="tscore-${p.id}">🔁 Trans: —</span><button id="remove-${p.id}" style="background:#f1f5f9;color:#1e293b;">✖</button></div>
        <div class="transcript" id="preview-${p.id}">💬 awaiting speech...</div>
        <div class="transcript" id="trans-${p.id}" style="border-left-color:#9b59b6;">🌍 translation will appear</div>
        </div>`).join('');
    parts.forEach(p=>{
        document.getElementById(`btn-${p.id}`)?.addEventListener('click',()=>p.isListening?stop(p):start(p));
        document.getElementById(`remove-${p.id}`)?.addEventListener('click',()=>{ stop(p); parts=parts.filter(x=>x.id!==p.id); render(); });
    });
}
const escapeHtml=s=>s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
function addPart(name,lang){ let id=nextId++; let p={id,name:name.trim()||"Speaker",lang,isListening:false,recog:null,lastCis:null,lastTrans:null}; parts.push(p); p.recog=createRecog(p); render(); }
function resetAll(){
    history=[]; ema=null;
    parts.forEach(p=>{p.lastCis=null;p.lastTrans=null;updateCard(p);let pre=document.getElementById(`preview-${p.id}`);if(pre)pre.innerText="💬 awaiting speech...";let td=document.getElementById(`trans-${p.id}`);if(td)td.innerText="🌍 translation will appear";});
    if(chart){chart.data.labels=[];chart.data.datasets.forEach(d=>d.data=[]);chart.update();}
    document.getElementById('turnCount').innerText='0'; document.getElementById('emaScore').innerText='—'; document.getElementById('lastTS').innerText='—';
    document.getElementById('interpretationBox').innerHTML='Awaiting speech...';
}
function stopAll(){ parts.forEach(p=>stop(p)); }

// ---------- Init ----------
window.onload=()=>{
    chart=new Chart(document.getElementById('graph'),{type:'line',data:{labels:[],datasets:[
        {label:'CIS',data:[],borderColor:'#2c7da0',borderWidth:3,pointRadius:3,tension:0.2},
        {label:'EMA',data:[],borderColor:'#e9b35f',borderWidth:3,borderDash:[5,5]},
        {label:'Translation',data:[],borderColor:'#9b59b6',borderWidth:2,hidden:true}
    ]},options:{responsive:true,scales:{y:{min:0,max:10}}}});
    addPart("You","en"); addPart("Caller 1","es");
    document.getElementById('transToggle').onchange=e=>transEnabled=e.target.checked;
    document.getElementById('targetLang').onchange=e=>targetLang=e.target.value;
    document.getElementById('addBtn').onclick=()=>{let n=document.getElementById('newName').value;if(!n.trim())n="Speaker"; addPart(n,document.getElementById('newLang').value);};
    document.getElementById('resetBtn').onclick=resetAll;
    document.getElementById('stopAllBtn').onclick=stopAll;
    // Mock button
    let mock=document.createElement('button');mock.innerText="🎲 Mock";mock.style.background="#94a3b8";mock.onclick=async()=>{
        if(!parts.length)return;
        let p=parts[Math.floor(Math.random()*parts.length)];
        let fakeCis=+(Math.random()*6+2).toFixed(2);
        let transMock=null;
        if(transEnabled){
            let mt="This is a test utterance about stability.";
            let tr=await translate(mt,p.lang,targetLang);
            transMock={trans:tr.trans, conf:tr.conf, original:mt};
        }
        await addTurn(p.name,fakeCis,transMock);
        p.lastCis=fakeCis; if(transMock)p.lastTrans=transScore(transMock.trans,transMock.conf);
        updateCard(p);
        let pre=document.getElementById(`preview-${p.id}`); if(pre)pre.innerText=`💬 [mock] ${transMock?transMock.trans.slice(0,45):"test"}`;
        let td=document.getElementById(`trans-${p.id}`); if(td&&transMock)td.innerText=`🌍 ➜ ${transMock.trans.slice(0,45)}`;
    };
    document.querySelector('.add-bar').appendChild(mock);
};
</script>
</body>
</html>
