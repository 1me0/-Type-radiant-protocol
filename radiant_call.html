<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Intelligence · Rigorous CIS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{box-sizing:border-box; font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;}
        body{background:#f0f4f8; margin:0; padding:20px;}
        .dashboard{max-width:1300px; margin:0 auto; display:flex; flex-wrap:wrap; gap:24px;}
        .participants{flex:1.2; min-width:260px; background:white; border-radius:28px; padding:18px; box-shadow:0 8px 20px rgba(0,0,0,0.05);}
        .chart-panel{flex:2; background:white; border-radius:28px; padding:18px; box-shadow:0 8px 20px rgba(0,0,0,0.05);}
        h2{font-size:1.4rem; margin:0 0 16px 0; border-left:4px solid #2c7da0; padding-left:14px;}
        .card{background:#f9fbfd; border-radius:20px; padding:14px; margin-bottom:16px; border:1px solid #e2e8f0;}
        .row{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap;}
        .name{font-weight:700; background:#eef2ff; padding:4px 12px; border-radius:40px;}
        .lang{font-size:0.7rem; font-family:monospace;}
        button{background:#1e4663; border:none; color:white; padding:6px 16px; border-radius:40px; cursor:pointer; font-weight:500; transition:0.1s;}
        button.listening{background:#c2410c; box-shadow:0 0 0 2px #ffedd5;}
        .status{font-size:0.75rem; background:#eef2ff; padding:4px 12px; border-radius:20px;}
        .score-badge{font-size:0.75rem; background:#f1f5f9; border-radius:20px; padding:4px 12px;}
        .transcript{font-size:0.7rem; color:#2d3e50; background:#f8fafc; border-radius:14px; padding:8px; margin-top:10px; font-style:italic; border-left:3px solid #2c7da0;}
        .add-panel{display:flex; gap:8px; margin-top:20px; flex-wrap:wrap;}
        input, select{padding:6px 12px; border-radius:40px; border:1px solid #cbd5e1; background:white;}
        canvas{max-height:350px; width:100%;}
        .summary{display:flex; justify-content:space-between; margin-top:16px; background:#eef2ff; border-radius:20px; padding:8px 14px; font-size:0.75rem;}
        button.secondary{background:#e2e8f0; color:#1e293b;}
    </style>
</head>
<body>
<div class="dashboard">
    <div class="participants">
        <h2>🎙️ Participants</h2>
        <div id="participantsList"></div>
        <div class="add-panel">
            <input type="text" id="newName" placeholder="Name" value="Speaker">
            <select id="newLang"><option value="en">English</option><option value="es">Spanish</option><option value="fr">French</option></select>
            <button id="addBtn">+ Add</button>
            <button id="resetHistoryBtn" class="secondary">⟳ Reset scores</button>
            <button id="stopAllBtn" class="secondary">⏹️ Stop all</button>
        </div>
        <div class="summary"><span>📊 Turns: <strong id="turnCount">0</strong></span><span>🌍 Global (EMA): <strong id="emaScore">—</strong></span></div>
    </div>
    <div class="chart-panel">
        <h2>📈 CIS & Global Score</h2>
        <canvas id="graphCanvas"></canvas>
        <div style="font-size:0.7rem; text-align:center; margin-top:12px;">CIS = f(entropy, TTR, length) | Global = exponential moving average (α=0.3)</div>
    </div>
</div>

<script>
    // --------------------- MATHEMATICAL RIGOR: CIS SCORE (0-10) ---------------------
    // CIS = 10 * tanh( 0.5 * ( H_norm + TTR + L_norm ) )
    // where H_norm = shannon entropy / log2(vocabSize+1) , TTR = unique/ total words, L_norm = wordCount/15 capped
    function computeCIS(transcript) {
        if (!transcript || transcript.trim().length === 0) return 0;
        const words = transcript.toLowerCase().match(/\b[\w']+\b/g) || [];
        if (words.length === 0) return 0;
        const wordCount = words.length;
        const uniqueWords = new Set(words);
        const vocabSize = uniqueWords.size;
        const TTR = vocabSize / wordCount;   // type-token ratio (richness)
        
        // Shannon entropy: -Σ p(w) * log2(p(w))
        const freq = new Map();
        for (let w of words) freq.set(w, (freq.get(w)||0) + 1);
        let entropy = 0;
        for (let f of freq.values()) { let p = f / wordCount; entropy -= p * Math.log2(p); }
        const maxEntropy = Math.log2(vocabSize + 1e-6);
        const H_norm = maxEntropy > 0 ? Math.min(1, entropy / maxEntropy) : 0;
        
        // length score: logistic shape -> caps at 15 words gives ~0.9
        const L_norm = Math.min(1, wordCount / 15);
        
        // combined raw metric: weighted equally
        let raw = (H_norm * 0.4) + (TTR * 0.4) + (L_norm * 0.2);  // 0..1 range
        // use hyperbolic tangent to stretch, then scale to 0-10
        let cis = 10 * Math.tanh(1.8 * raw);   // tanh gain: 1.8 gives good spread
        return Math.min(10, Math.max(0, parseFloat(cis.toFixed(2))));
    }
    
    // Global Score: Exponential Moving Average (EMA) with α = 0.3, more reactive and mathematically smooth
    let globalEMA = null;
    function updateGlobalEMA(newCIS) {
        if (globalEMA === null) globalEMA = newCIS;
        else globalEMA = 0.3 * newCIS + 0.7 * globalEMA;
        return globalEMA;
    }
    
    // --------------------- STATE ---------------------
    let participants = [];       // {id, name, lang, isListening, recognition, lastScore, domId}
    let nextId = 1;
    let history = [];            // {turn, participantName, cis, globalEMA}
    let chart = null;
    let activeListenerId = null;
    
    // --------------------- CHART INIT ---------------------
    function initChart() {
        const ctx = document.getElementById('graphCanvas').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'CIS (per turn)', data: [], borderColor: '#2c7da0', borderWidth: 3, pointRadius: 3, tension: 0.2, fill: false },
                { label: 'Global EMA (α=0.3)', data: [], borderColor: '#e9b35f', borderWidth: 3, borderDash: [5,5], pointRadius: 2, tension: 0.3, fill: false }
            ]},
            options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: 0, max: 10, title: { display: true, text: 'Score' } }, x: { title: { display: true, text: 'Turn' } } } }
        });
    }
    
    function refreshChart() {
        if (!chart) return;
        chart.data.labels = history.map((_, i) => i+1);
        chart.data.datasets[0].data = history.map(h => h.cis);
        chart.data.datasets[1].data = history.map(h => h.globalEMA);
        chart.update();
        document.getElementById('turnCount').innerText = history.length;
        document.getElementById('emaScore').innerText = history.length ? history[history.length-1].globalEMA.toFixed(2) : '—';
    }
    
    function addTurn(participantName, cisValue) {
        const ema = updateGlobalEMA(cisValue);
        history.push({ turn: history.length+1, participantName, cis: cisValue, globalEMA: ema });
        refreshChart();
        // update last score on participant card
        const p = participants.find(p => p.name === participantName);
        if (p) { p.lastScore = cisValue; updateCardUI(p); }
    }
    
    // --------------------- SPEECH RECOGNITION WRAPPER ---------------------
    function createRecognition(p) {
        const SpeechRecog = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecog) { alert("Browser not supported"); return null; }
        const recog = new SpeechRecog();
        recog.continuous = true;
        recog.interimResults = false;
        recog.lang = p.lang;
        recog.onresult = (event) => {
            let final = "";
            for (let i = event.resultIndex; i < event.results.length; i++)
                if (event.results[i].isFinal) final += event.results[i][0].transcript + " ";
            if (final.trim()) {
                const cisScore = computeCIS(final);
                addTurn(p.name, cisScore);
                // update transcript preview
                const previewDiv = document.getElementById(`preview-${p.id}`);
                if (previewDiv) previewDiv.innerText = `💬 "${final.trim().slice(0, 60)}"`;
                p.lastScore = cisScore;
                updateCardUI(p);
            }
        };
        recog.onerror = (e) => { if (p.isListening) stopListening(p); updateStatusUI(p, "error", false); };
        recog.onend = () => { if (p.isListening) { p.isListening = false; if(activeListenerId === p.id) activeListenerId = null; updateStatusUI(p, "stopped", false); updateButtonUI(p, false); } };
        return recog;
    }
    
    async function startListening(p) {
        if (!p.recognition) p.recognition = createRecognition(p);
        if (!p.recognition) return;
        if (activeListenerId && activeListenerId !== p.id) {
            const active = participants.find(part => part.id === activeListenerId);
            if (active && active.isListening) stopListening(active);
        }
        if (p.isListening) return;
        try {
            await p.recognition.start();
            p.isListening = true;
            activeListenerId = p.id;
            updateStatusUI(p, "listening", true);
            updateButtonUI(p, true);
        } catch(e) { console.warn(e); updateStatusUI(p, "mic error", false); }
    }
    
    function stopListening(p) {
        if (p.recognition && p.isListening) {
            try { p.recognition.stop(); } catch(e) {}
            p.isListening = false;
            if (activeListenerId === p.id) activeListenerId = null;
            updateStatusUI(p, "stopped", false);
            updateButtonUI(p, false);
        }
    }
    
    // --------------------- UI RENDERING (short, efficient) ---------------------
    function updateStatusUI(p, text, isActive) {
        const span = document.getElementById(`status-${p.id}`);
        if(span) span.innerHTML = isActive ? `🔴 ${text}` : `⏹️ ${text}`;
    }
    function updateButtonUI(p, isActive) {
        const btn = document.getElementById(`btn-${p.id}`);
        if(btn) { btn.innerText = isActive ? "⏹️ Stop" : "🎤 Start"; btn.classList.toggle('listening', isActive); }
    }
    function updateCardUI(p) {
        const scoreSpan = document.getElementById(`score-${p.id}`);
        if(scoreSpan) scoreSpan.innerText = p.lastScore !== undefined ? `CIS: ${p.lastScore.toFixed(1)}` : `CIS: —`;
    }
    
    function renderParticipants() {
        const container = document.getElementById('participantsList');
        if(!container) return;
        container.innerHTML = participants.map(p => `
            <div class="card" data-id="${p.id}">
                <div class="row">
                    <span class="name">${escapeHtml(p.name)}</span>
                    <span class="lang">🌐 ${p.lang.toUpperCase()}</span>
                    <button id="btn-${p.id}" class="btn-listen">🎤 Start</button>
                </div>
                <div class="row">
                    <span class="status" id="status-${p.id}">⏹️ stopped</span>
                    <span class="score-badge" id="score-${p.id}">CIS: —</span>
                    <button class="secondary" style="padding:2px 12px;" id="remove-${p.id}">✖</button>
                </div>
                <div class="transcript" id="preview-${p.id}">💬 awaiting speech...</div>
            </div>
        `).join('');
        // attach events after render
        participants.forEach(p => {
            const btn = document.getElementById(`btn-${p.id}`);
            if(btn) btn.onclick = () => p.isListening ? stopListening(p) : startListening(p);
            const rmBtn = document.getElementById(`remove-${p.id}`);
            if(rmBtn) rmBtn.onclick = () => { stopListening(p); participants = participants.filter(part => part.id !== p.id); renderParticipants(); };
        });
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function addParticipant(name, lang) {
        const id = nextId++;
        const newPart = {
            id, name: name.trim() || "Speaker", lang, isListening: false, recognition: null, lastScore: null,
        };
        participants.push(newPart);
        // initialize recognition lazily
        newPart.recognition = createRecognition(newPart);
        renderParticipants();
        return newPart;
    }
    
    function resetAllScores() {
        history = [];
        globalEMA = null;
        participants.forEach(p => { p.lastScore = null; updateCardUI(p); });
        refreshChart();
        // optional: clear transcript previews
        participants.forEach(p => { const preview = document.getElementById(`preview-${p.id}`); if(preview) preview.innerText = "💬 awaiting speech..."; });
    }
    
    function stopAll() { participants.forEach(p => { if(p.isListening) stopListening(p); }); activeListenerId = null; }
    
    // --------------------- INITIAL SETUP ---------------------
    window.onload = () => {
        initChart();
        // default two participants: You (en), Caller (es)
        addParticipant("You", "en");
        addParticipant("Caller 1", "es");
        // UI actions
        document.getElementById('addBtn').onclick = () => {
            let name = document.getElementById('newName').value;
            if(!name.trim()) name = "Analyst";
            const lang = document.getElementById('newLang').value;
            addParticipant(name, lang);
        };
        document.getElementById('resetHistoryBtn').onclick = resetAllScores;
        document.getElementById('stopAllBtn').onclick = stopAll;
        // manual demo score button (invisible but rigorous tester)
        const demoBtn = document.createElement('button');
        demoBtn.innerText = "📐 Mock Turn";
        demoBtn.className = "secondary";
        demoBtn.style.marginLeft = "8px";
        demoBtn.onclick = () => {
            if(participants.length) {
                const rand = participants[Math.floor(Math.random()*participants.length)];
                const mockCIS = parseFloat((Math.random() * 7 + 1.5).toFixed(2));
                addTurn(rand.name, mockCIS);
                rand.lastScore = mockCIS;
                updateCardUI(rand);
                const preview = document.getElementById(`preview-${rand.id}`);
                if(preview) preview.innerHTML = `📊 simulated CIS = ${mockCIS}`;
                setTimeout(() => { if(preview && preview.innerHTML.includes('simulated')) preview.innerHTML = "💬 awaiting speech..."; }, 2000);
            }
        };
        document.querySelector('.add-panel').appendChild(demoBtn);
    };
</script>
</body>
</html>
