<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Radiant Protocol · Demo</title>
    <style>
        *{box-sizing:border-box;font-family:system-ui,sans-serif}body{background:linear-gradient(135deg,#0a1a2a,#1a2a3a);min-height:100vh;margin:0;padding:20px;color:#fff}.container{max-width:1200px;margin:auto}h1{font-size:2rem;background:linear-gradient(135deg,#fff,#9bb8d4);-webkit-background-clip:text;background-clip:text;color:transparent}.sub{color:#9bb8d4;margin-bottom:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:28px;padding:20px;border:1px solid rgba(255,255,255,.1)}.card h2{font-size:1.3rem;margin:0 0 12px;color:#fff}input,textarea,select{width:100%;padding:10px;border-radius:40px;border:1px solid #2c4a6a;background:rgba(0,0,0,.3);color:#fff;margin-bottom:10px}button{background:#2c7a4d;border:none;padding:8px 16px;border-radius:40px;color:#fff;font-weight:600;cursor:pointer;margin-right:8px;margin-bottom:8px}button:hover{background:#1e5a3a}.btn-secondary{background:#3a5a7a}.btn-secondary:hover{background:#2c4a6a}.reset-btn{background:#8a2a2a}.reset-btn:hover{background:#6a1a1a}.score-badge{background:#1e2a3a;border-radius:30px;padding:8px 16px;margin-top:10px;display:inline-block;border:1px solid #2c4a6a;transition:filter 0.3s ease, background 0.3s ease}.metric-slider{margin:12px 0}.metric-slider label{display:flex;justify-content:space-between;font-size:.8rem;color:#cbd5e0}input[type=range]{width:100%;margin:5px 0}.balance-display{background:rgba(0,0,0,.4);border-radius:30px;padding:8px 16px;margin-bottom:16px;font-size:.9rem}.flex-buttons{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}footer{text-align:center;margin-top:30px;color:#5a7a9a;font-size:.75rem}
    </style>
</head>
<body>
<div class="container">
    <h1>✨ Radiant Protocol · Live Demo</h1>
    <div class="sub">ZK Proof of Presence · CIS · Value Alignment</div>
    <div class="grid">
        <!-- Presence -->
        <div class="card">
            <h2>🔹 Proof of Presence</h2>
            <p style="color:#cbd5e0;font-size:.9rem">Deterministic score from your ID.</p>
            <input id="presenceId" placeholder="Wallet or name">
            <button id="registerPresenceBtn">✨ Register</button>
            <div id="presenceResult"></div>
        </div>
        <!-- CIS -->
        <div class="card">
            <h2>📊 CIS Score</h2>
            <textarea id="messageText" rows="2" placeholder="Message..."></textarea>
            <div class="metric-slider"><label>Alignment <span id="alignVal">0.80</span></label><input type="range" id="alignment" min="0" max="1" step="0.01" value="0.8"></div>
            <div class="metric-slider"><label>Understanding <span id="understandVal">0.80</span></label><input type="range" id="understanding" min="0" max="1" step="0.01" value="0.8"></div>
            <div class="metric-slider"><label>Accuracy <span id="accuracyVal">0.80</span></label><input type="range" id="accuracy" min="0" max="1" step="0.01" value="0.8"></div>
            <div class="metric-slider"><label>Distortion <span id="distortVal">0.10</span></label><input type="range" id="distortion" min="0" max="1" step="0.01" value="0.1"></div>
            <button id="computeCISBtn">🧠 Compute</button>
            <div id="cisResult" class="score-badge"></div>
        </div>
        <!-- Fee Game -->
        <div class="card">
            <h2>💰 Tx Fee Game</h2>
            <p style="color:#cbd5e0;font-size:.9rem">50% fee to architect. Beat record → bonus.</p>
            <input id="txAmount" type="number" placeholder="Amount (RAD)" value="100">
            <input id="recipient" placeholder="Recipient address">
            <button id="sendTxBtn">⚡ Send</button>
            <div id="txResult"></div>
            <div id="recordDisplay" class="score-badge">Record: 0 RAD</div>
        </div>
        <!-- Staking -->
        <div class="card">
            <h2>🏦 Staking</h2>
            <input id="stakeAmount" type="number" placeholder="Amount" value="50">
            <div class="flex-buttons">
                <button id="stakeBtn">🔒 Stake</button>
                <button id="unstakeBtn" class="btn-secondary">🔓 Unstake</button>
                <button id="claimRewardsBtn">💰 Claim</button>
            </div>
            <div id="stakingInfo" class="score-badge"></div>
            <div id="rewardInfo" class="score-badge"></div>
            <div class="balance-display" id="balanceDisplay"></div>
        </div>
    </div>
    <div style="text-align:center;margin-top:20px">
        <button id="resetDemoBtn" class="reset-btn">🗑️ Reset All</button>
    </div>
    <footer>🔐 Client‑side demo · Integer RAD · LocalStorage · Smooth distortion</footer>
</div>
<script>
(function(){
    // State (integers for RAD)
    let state = {
        presenceId: '', presenceScore: 0, lastRecord: 0,
        userStake: 0, totalStaked: 0, rewardPool: 100,
        userRewards: 0, userBalance: 1000, architectBalance: 0, treasury: 500
    };
    const recipMap = new Map();
    const STORE = {
        pid:'rp_id', psc:'rp_score', rec:'rp_rec', usk:'rp_usk', tsk:'rp_tsk', rpl:'rp_rpl', urw:'rp_urw', ubl:'rp_ubl', abl:'rp_abl', trs:'rp_trs'
    };

    function hash(s){ let h=5381; for(let i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i); return (h>>>0)%101; }
    function persist(){
        localStorage.setItem(STORE.pid, state.presenceId); localStorage.setItem(STORE.psc, state.presenceScore);
        localStorage.setItem(STORE.rec, state.lastRecord); localStorage.setItem(STORE.usk, state.userStake);
        localStorage.setItem(STORE.tsk, state.totalStaked); localStorage.setItem(STORE.rpl, state.rewardPool);
        localStorage.setItem(STORE.urw, state.userRewards); localStorage.setItem(STORE.ubl, state.userBalance);
        localStorage.setItem(STORE.abl, state.architectBalance); localStorage.setItem(STORE.trs, state.treasury);
        recipMap.forEach((v,k)=>localStorage.setItem(`bal_${k}`,v));
    }
    function load(){
        state.presenceId = localStorage.getItem(STORE.pid)||'';
        state.presenceScore = parseInt(localStorage.getItem(STORE.psc)||'0');
        state.lastRecord = parseInt(localStorage.getItem(STORE.rec)||'0');
        state.userStake = parseInt(localStorage.getItem(STORE.usk)||'0');
        state.totalStaked = parseInt(localStorage.getItem(STORE.tsk)||'0');
        state.rewardPool = parseInt(localStorage.getItem(STORE.rpl)||'100');
        state.userRewards = parseInt(localStorage.getItem(STORE.urw)||'0');
        state.userBalance = parseInt(localStorage.getItem(STORE.ubl)||'1000');
        state.architectBalance = parseInt(localStorage.getItem(STORE.abl)||'0');
        state.treasury = parseInt(localStorage.getItem(STORE.trs)||'500');
        for(let i=0;i<localStorage.length;i++){ let k=localStorage.key(i); if(k&&k.startsWith('bal_')) recipMap.set(k.slice(4),parseInt(localStorage.getItem(k))); }
    }
    function updateUI(){
        document.getElementById('recordDisplay').innerText = `Record: ${state.lastRecord} RAD`;
        document.getElementById('stakingInfo').innerHTML = `Stake: ${state.userStake} / ${state.totalStaked} RAD`;
        document.getElementById('rewardInfo').innerHTML = `Pool: ${state.rewardPool} · Pending: ${state.userRewards} RAD`;
        document.getElementById('balanceDisplay').innerHTML = `💎 You: ${state.userBalance} · Architect: ${state.architectBalance} · Treasury: ${state.treasury}`;
        if(state.presenceId) document.getElementById('presenceResult').innerHTML = `<div class="score-badge">✅ ${state.presenceId.slice(0,10)}… Score: ${state.presenceScore}</div>`;
        else document.getElementById('presenceResult').innerHTML = '';
    }

    // Presence
    document.getElementById('registerPresenceBtn').onclick = ()=>{
        let id = document.getElementById('presenceId').value.trim();
        if(!id) return alert('Enter ID');
        state.presenceId = id; state.presenceScore = hash(id);
        persist(); updateUI();
    };
    // CIS sliders + distortion visualization
    const sliders = ['alignment','understanding','accuracy','distortion'];
    sliders.forEach(id=>{
        let s = document.getElementById(id), sp = document.getElementById(id+'Val');
        s.oninput = ()=> { sp.innerText = parseFloat(s.value).toFixed(2); }
    });
    function updateCISResult(){
        let a = +document.getElementById('alignment').value,
            u = +document.getElementById('understanding').value,
            c = +document.getElementById('accuracy').value,
            d = +document.getElementById('distortion').value;
        let cis = Math.min(10, Math.max(0, (0.2*a + 0.3*u + 0.4*c - 0.1*d)*10 ));
        let resEl = document.getElementById('cisResult');
        resEl.innerHTML = `CIS: ${cis.toFixed(2)} / 10`;
        // Apply blur proportional to distortion (max 8px blur)
        let blurAmount = d * 8;
        resEl.style.filter = `blur(${blurAmount}px)`;
    }
    document.getElementById('computeCISBtn').onclick = updateCISResult;
    document.getElementById('distortion').oninput = updateCISResult;
    updateCISResult();

    // Fee game
    function updateRecord(amt){ if(amt > state.lastRecord){ state.lastRecord = amt; persist(); updateUI(); return true; } return false; }
    document.getElementById('sendTxBtn').onclick = ()=>{
        let amt = parseInt(document.getElementById('txAmount').value), rec = document.getElementById('recipient').value.trim();
        if(isNaN(amt)||amt<=0||!rec) return alert('Invalid input');
        let fee = Math.floor(amt*0.5), total = amt+fee;
        if(state.userBalance < total) return alert(`Need ${total} RAD, have ${state.userBalance}`);
        state.userBalance -= total; state.architectBalance += fee;
        recipMap.set(rec, (recipMap.get(rec)||0)+amt);
        let bonus = 0, beat = amt > state.lastRecord;
        if(beat && state.treasury >= fee){ bonus = fee; state.treasury -= fee; state.userBalance += fee; updateRecord(amt); }
        else if(beat) alert('Treasury low, no bonus');
        persist(); updateUI();
        document.getElementById('txResult').innerHTML = `<div class="score-badge">✅ Sent ${amt} RAD, fee ${fee}${beat&&bonus?` +${bonus} bonus!`:''}</div>`;
        setTimeout(()=>document.getElementById('txResult').innerHTML='', 4000);
    };
    // Staking
    document.getElementById('stakeBtn').onclick = ()=>{
        let amt = parseInt(document.getElementById('stakeAmount').value);
        if(isNaN(amt)||amt<=0||state.userBalance<amt) return alert('Invalid amount');
        state.userBalance -= amt; state.userStake += amt; state.totalStaked += amt;
        persist(); updateUI();
    };
    document.getElementById('unstakeBtn').onclick = ()=>{
        let amt = parseInt(document.getElementById('stakeAmount').value);
        if(isNaN(amt)||amt<=0||amt>state.userStake) return alert('Invalid amount');
        state.userStake -= amt; state.totalStaked -= amt; state.userBalance += amt;
        persist(); updateUI();
    };
    document.getElementById('claimRewardsBtn').onclick = ()=>{
        if(state.userRewards<=0) return alert('No rewards');
        state.userBalance += state.userRewards; state.userRewards = 0;
        persist(); updateUI();
    };
    // Periodic rewards
    setInterval(()=>{
        if(state.totalStaked>0 && state.rewardPool>0){
            let share = Math.floor(state.rewardPool * (state.userStake / state.totalStaked));
            if(share>0){ state.userRewards += share; state.rewardPool -= share; persist(); updateUI(); }
        }
    }, 10000);
    // Reset
    document.getElementById('resetDemoBtn').onclick = ()=>{
        if(confirm('Reset all data?')){
            localStorage.clear();
            state = {presenceId:'',presenceScore:0,lastRecord:0,userStake:0,totalStaked:0,rewardPool:100,userRewards:0,userBalance:1000,architectBalance:0,treasury:500};
            recipMap.clear(); persist(); updateUI();
            document.getElementById('presenceId').value='';
            document.getElementById('distortion').value = 0.1;
            document.getElementById('distortVal').innerText = '0.10';
            updateCISResult();
        }
    };
    // Init
    load(); updateUI();
    if(state.presenceId) document.getElementById('presenceId').value = state.presenceId;
    sliders.forEach(id=>{ let s=document.getElementById(id); document.getElementById(id+'Val').innerText = parseFloat(s.value).toFixed(2); });
    updateCISResult();
})();
</script>
</body>
</html>
