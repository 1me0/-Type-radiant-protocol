version: '3.8'

services:
  # --- THE PULSE (Keep these) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    # ... existing config ...

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    # ... existing config ...

  # --- THE MIND (ADD THIS NOW) ---
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app.py:/app/app.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    command: uvicorn app:app --host 0.0.0.0 --port 8000

  # --- THE ENGINE (Keep this) ---
  worker:
    build: ./worker
    # ... existing config ...
    docker-compose up ganache
