version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ganache:
    image: trufflesuite/ganache:latest
    ports:
      - "8545:8545"
    command: --host 0.0.0.0 --port 8545 --deterministic --mnemonic "test test test test test test test test test test test junk"

  relayer:
    build: ./relayer
    depends_on:
      - ganache
      - kafka
    environment:
      RPC_URL: http://ganache:8545
      CONTRACT_ADDRESS: <your_deployed_contract>
      RELAYER_PRIVATE_KEY: 0x4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d
    volumes:
      - ./relayer:/app
      - ./contracts:/contracts
    working_dir: /app
    command: node index.js

  worker:
    build: ./worker
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
    volumes:
      - ./worker:/app
    working_dir: /app

  websocket:
    build: ./websocket
    ports:
      - "4000:4000"
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
    volumes:
      - ./websocket:/app
    working_dir: /app
    command: node index.js

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - websocket
    environment:
      REACT_APP_WS_URL: ws://localhost:4000
      REACT_APP_CONTRACT_ADDRESS: <your_deployed_contract>

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app.py:/app/app.py
    command: uvicorn app:app --host 0.0.0.0 --port 8000
