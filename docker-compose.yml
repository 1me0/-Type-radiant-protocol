version: '3.8'

services:
  # The Message Backbone (Kafka)
  broker:
    image: apache/kafka:latest
    container_name: radiant-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

  # The Truth Engine (Your Rust Worker)
  radiant-worker:
    image: rust:latest
    container_name: cis-worker-alpha
    depends_on:
      - broker
    volumes:
      - .:/usr/src/app
    command: echo "Worker Alpha: Syncing with Master Formula... Field Active."

  # The Settlement Layer (Database)
  db:
    image: postgres:15-alpine
    container_name: cis-ledger
    environment:
      POSTGRES_PASSWORD: radiant_password
      
